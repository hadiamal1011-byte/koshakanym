<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любви ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- Летающие сердечки -->
<div class="hearts"></div>

<!-- ================= 1 ЭКРАН ================= -->

<section id="screen1" class="screen active">

    <h1>
        Ты готова,<br>
        моя любовь?🙂
    </h1>

    <button id="btnStart" class="btn">
        Готова
    </button>

    <p class="thanks">
        Спасибо за всё ❤️
    </p>

</section>


<!-- ================= 2 ЭКРАН ================= -->

<section id="screen2" class="screen">

    <h2>
        Жонушка ❤️
    </h2>

    <div id="letter" class="letter"></div>

    <button id="btnLetter" class="btn hide">
        Давай поговорим
    </button>

</section>



<!-- ================= 3 ЭКРАН ================= -->

<section id="screen3" class="screen">

    <div class="envelope">

        <div class="paper">

            <h2>💌</h2>

            <p>
                Если хочешь поговорить,
                <br><br>
                напиши.
                ❤️
            </p>

        </div>

    </div>

</section>


<script src="script.js"></script>

</body>
</html>
